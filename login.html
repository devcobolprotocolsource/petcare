<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — VetCare</title>
  <link rel="stylesheet" href="styles/style.css">
  <script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.js"></script>
</head>
<body class="is-83">
  <div class="is-84">
    <div class="is-85">
      <div class="lp-logo"><div class="logo-pill">Vet</div>Care</div>
      <p class="is-86">Masuk untuk mengakses dashboard Anda</p>
    </div>
    <form id="loginForm" class="is-87" onsubmit="handleLogin(event)">
      <div class="is-88">
        <label class="is-89">Email</label>
        <input id="email" type="email" required placeholder="email@contoh.com" class="is-90">
        <label class="is-89">Password</label>
        <input id="password" type="password" required placeholder="password" class="is-90">
      </div>
      <div class="is-91">
        <button class="btn btn-primary" type="submit">Masuk</button>
        <a href="index.html" class="btn btn-ghost">Kembali ke Beranda</a>
      </div>
      <p id="loginError" class="is-92">Email atau password salah.</p>
    </form>
  </div>
  <script src="scripts/app.js"></script>
  <script>if(window.lucide)lucide.createIcons()</script>
</body>
</html>
